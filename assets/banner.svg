<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CurlyRpc">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arrowTop" x1="196" y1="0" x2="316" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="arrowBot" x1="316" y1="0" x2="196" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E1B4B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="40" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="360" rx="40" fill="url(#gloss)"/>

  <!-- Logo mark, translated/scaled into the left area -->
  <g transform="translate(70 36) scale(0.56)" filter="url(#soft)" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M222 116 C182 116 184 142 184 174 C184 214 180 236 152 260 C180 284 184 306 184 346 C184 378 182 404 222 404"
          stroke="#FFFFFF" stroke-width="30"/>
    <path d="M290 116 C330 116 328 142 328 174 C328 214 332 236 360 260 C332 284 328 306 328 346 C328 378 330 404 290 404"
          stroke="#FFFFFF" stroke-width="30"/>
    <path d="M206 224 L300 224" stroke="url(#arrowTop)" stroke-width="24"/>
    <path d="M286 206 L306 224 L286 242" stroke="url(#arrowTop)" stroke-width="24"/>
    <path d="M306 296 L212 296" stroke="url(#arrowBot)" stroke-width="24"/>
    <path d="M226 278 L206 296 L226 314" stroke="url(#arrowBot)" stroke-width="24"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="186" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="104" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Curly<tspan fill="#C7D2FE">Rpc</tspan></text>
  <text x="404" y="244" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="33" font-weight="400" fill="#E0E7FF" letter-spacing="0.5">AOT-friendly JSON-RPC 2.0 for .NET</text>
</svg>
